<div class="header">
  <div class="logo">
    <img src="campus_issue.png" alt="logo">
    <span>CampusCare</span>
  </div>
</div>

<div class="container">

 <!-- LOADING -->
<div class="loading-box" *ngIf="loading">
  <p>Loading report...</p>
</div>

<div class="card" *ngIf="!loading && report">

    <div class="card-title">Update Issue Status</div>

    <div class="issue-box">
      <small>ISSUE REFERENCE</small>
      <h3>{{ report.headline }}</h3>
      <p class="cat">{{ report.category }} &nbsp;·&nbsp; {{ report.location }}</p>
      <p class="desc">{{ report.description }}</p>
    </div>

    <div class="status-section">
      <label>Change Status</label>
      <div class="status-buttons">
        <button (click)="setStatus('Pending')"     [class.active]="selectedStatus === 'Pending'">Pending</button>
        <button (click)="setStatus('In Progress')" [class.active]="selectedStatus === 'In Progress'">In Progress</button>
        <button (click)="setStatus('Resolved')"    [class.active]="selectedStatus === 'Resolved'">Resolved</button>
      </div>
    </div>

    <div class="actions">
      <button class="cancel" (click)="cancel()">Cancel</button>
      <button class="save"   (click)="save()">Save Changes</button>
    </div>

  </div>

</div>

<div class="footer">© 2026 Campus Issues Report System – Improving Campus Life Together</div>
